<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YT Music Tags</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════ HEADER -->
<header class="app-header">
  <div class="brand">
    <div class="brand-pip"></div>
    <span class="brand-name">YT Music Tags</span>
  </div>

  <div class="header-ops">
    <div class="op-cluster">
      <button id="btn-sync" class="btn btn-accent">Sync Library</button>
      <span id="sync-status" class="op-status"></span>
    </div>

    <div class="op-divider"></div>

    <div class="op-cluster">
      <button id="btn-enrich" class="btn btn-accent">Enrich</button>
      <button id="btn-enrich-stop" class="btn btn-danger hidden">■ Stop</button>
      <span id="enrich-status" class="op-status"></span>
    </div>
  </div>
</header>

<!-- ══════════════════════════════════════════════════════ CONTROLS -->
<div class="controls-strip">

  <div class="query-line">
    <span class="sql-tag">WHERE</span><input
      id="filter-input"
      type="text"
      class="query-input"
      placeholder="rating > 7  ORDER BY title"
      autocomplete="off"
      spellcheck="false"
    /><button id="btn-go" class="btn btn-accent btn-attached">Run</button>
  </div>

  <div id="filter-error" class="filter-error hidden"></div>

  <div class="playlist-line">
    <input
      id="playlist-name"
      type="text"
      class="playlist-input"
      placeholder="Playlist name"
    /><button id="btn-create-playlist" class="btn btn-secondary btn-attached">↗ Create / Refresh</button>
    <span id="playlist-status" class="op-status playlist-status-text"></span>
  </div>

</div>

<!-- ════════════════════════════════════════════════════ TABLE AREA -->
<div class="table-area">

  <div class="table-bar">
    <span id="selected-count" class="sel-count">0 selected</span>
    <div class="bulk-group">
      <span class="bulk-lbl">Set</span>
      <select id="bulk-attr" class="bulk-select"></select>
      <span class="bulk-lbl">to</span>
      <input id="bulk-value" type="text" class="bulk-val" placeholder="value" />
      <button id="btn-bulk-apply" class="btn btn-accent btn-sm">Apply</button>
      <button id="btn-deselect-all" class="btn btn-ghost btn-sm">Clear</button>
    </div>
    <span id="bulk-status" class="op-status bulk-status-text"></span>
    <div class="tbar-right">
      <span id="result-count" class="result-count hidden"></span>
      <div class="col-picker-wrap">
        <button id="btn-col-picker" class="btn btn-ghost btn-sm">Columns ▾</button>
        <div id="col-picker" class="col-picker hidden"></div>
      </div>
    </div>
  </div>

  <div id="table-wrap" class="table-wrap hidden">
    <table id="songs-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <div id="empty-msg" class="empty-state">
    Press <kbd>Sync Library</kbd> then <kbd>Run</kbd> to load songs.
  </div>

</div>

<script src="/static/app.js"></script>
</body>
</html>
