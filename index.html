<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>crates</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <div class="topbar">
    <h1 class="brand">crates</h1>
    <input id="search" class="search" type="text" placeholder="Search your library..." />
    <span id="count" class="count">loading…</span>
    <button id="refresh-btn" class="refresh-btn">Refresh</button>
  </div>

  <div id="list-wrap" class="list-wrap">
    <div id="state-msg" class="state-msg">Loading your library…</div>
    <div id="list"></div>
  </div>

  <div class="dock">
    <div id="yt-mount" class="yt-mount"></div>
    <div class="dock-info">
      <div id="dock-title" class="dock-title"></div>
      <div id="dock-artist" class="dock-artist"></div>
      <div id="dock-error" class="dock-error"></div>
      <div id="dock-empty" class="dock-empty">Pick a track to start playing</div>
    </div>
    <button id="play-btn" class="play-btn" disabled>▶</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
