<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>crates</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #15130F;
    --surface: #1E1B16;
    --surface-hover: #262219;
    --border: #322D24;
    --text: #F2EDE4;
    --text-muted: #9B9388;
    --accent: #E8A33D;
    --accent-text: #15130F;
    --error: #D1604B;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
  }

  #root{ height: 100%; }

  .app{
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .topbar{
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .brand{
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.01em;
    color: var(--text);
    margin: 0;
    white-space: nowrap;
  }

  .search{
    flex: 1;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    outline: none;
  }
  .search::placeholder{ color: var(--text-muted); }
  .search:focus{ border-color: var(--accent); }

  .count{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .refresh-btn{
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    cursor: pointer;
  }
  .refresh-btn:hover{ color: var(--text); border-color: var(--text-muted); }

  .list-wrap{
    flex: 1;
    overflow-y: auto;
    padding: 8px 24px 140px 24px;
  }

  .state-msg{
    color: var(--text-muted);
    padding: 40px 0;
    text-align: center;
    font-size: 14px;
  }
  .state-msg.error{ color: var(--error); }

  .row{
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 9px 10px;
    border: none;
    border-left: 3px solid transparent;
    background: transparent;
    border-radius: 6px;
    cursor: pointer;
    text-align: left;
    font-family: 'Manrope', sans-serif;
  }
  .row:hover{ background: var(--surface); }
  .row.active{
    background: var(--surface);
    border-left-color: var(--accent);
  }

  .thumb{
    width: 40px;
    height: 40px;
    border-radius: 4px;
    object-fit: cover;
    background: var(--surface-hover);
    flex-shrink: 0;
  }
  .thumb.placeholder{
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 11px;
  }

  .row-text{ overflow: hidden; }
  .row-title{
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-artist{
    font-size: 12.5px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* now playing dock — styled like a torn ticket stub */
  .dock{
    position: fixed;
    left: 24px;
    right: 24px;
    bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 18px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.45);
  }
  .dock::before{
    content: "";
    position: absolute;
    top: -1px; bottom: -1px;
    left: 124px;
    width: 0;
    border-left: 1px dashed var(--border);
  }

  .yt-mount{
    width: 64px;
    height: 64px;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
    background: #000;
  }
  .yt-mount iframe{ width: 100%; height: 100%; }

  .dock-info{ flex: 1; min-width: 0; margin-left: 8px; }
  .dock-title{
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 16px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .dock-artist{
    font-size: 12.5px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .dock-error{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--error);
    margin-top: 2px;
  }
  .dock-empty{
    font-size: 13px;
    color: var(--text-muted);
  }

  .play-btn{
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: var(--accent-text);
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .play-btn:disabled{ opacity: 0.4; cursor: default; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

const API_BASE = "";

const ERROR_MESSAGES = {
  2: "Invalid video reference.",
  5: "Can't play this in an HTML5 player.",
  100: "This track was removed or made private.",
  101: "The rights holder doesn't allow this track in embedded players.",
  150: "The rights holder doesn't allow this track in embedded players.",
  153: "Embed blocked — missing referrer info.",
};

function App() {
  const [songs, setSongs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [fetchError, setFetchError] = useState(null);
  const [query, setQuery] = useState("");

  const [currentTrack, setCurrentTrack] = useState(null);
  const [isPlaying, setIsPlaying] = useState(false);
  const [playError, setPlayError] = useState(null);
  const [playerReady, setPlayerReady] = useState(false);

  const playerDivRef = useRef(null);
  const playerRef = useRef(null);

  // load library from the local backend
  function loadLibrary() {
    setLoading(true);
    setFetchError(null);
    fetch(`${API_BASE}/api/library`)
      .then((r) => {
        if (!r.ok) throw new Error(`Server responded ${r.status}`);
        return r.json();
      })
      .then((data) => setSongs(data))
      .catch((err) =>
        setFetchError(
          `Couldn't reach the local server (${err.message}). Is server.py running on port 5001?`
        )
      )
      .finally(() => setLoading(false));
  }

  useEffect(() => {
    loadLibrary();
  }, []);

  // set up the YouTube IFrame Player once, on mount
  useEffect(() => {
    function createPlayer() {
      playerRef.current = new YT.Player(playerDivRef.current, {
        height: "64",
        width: "64",
        playerVars: { playsinline: 1, origin: window.location.origin },
        events: {
          onReady: () => setPlayerReady(true),
          onStateChange: (e) => setIsPlaying(e.data === YT.PlayerState.PLAYING),
          onError: (e) =>
            setPlayError(ERROR_MESSAGES[e.data] || `Playback error (code ${e.data})`),
        },
      });
    }

    if (window.YT && window.YT.Player) {
      createPlayer();
    } else {
      window.onYouTubeIframeAPIReady = createPlayer;
      const tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      document.body.appendChild(tag);
    }
  }, []);

  function refresh() {
    setLoading(true);
    fetch(`${API_BASE}/api/refresh`, { method: "POST" })
      .then((r) => r.json())
      .then((data) => setSongs(data))
      .catch((err) => setFetchError(err.message))
      .finally(() => setLoading(false));
  }

  function playSong(song) {
    setPlayError(null);
    setCurrentTrack(song);
    if (playerRef.current && playerRef.current.loadVideoById) {
      playerRef.current.loadVideoById(song.videoId);
      playerRef.current.playVideo();
    }
  }

  function togglePlayPause() {
    if (!playerRef.current || !currentTrack) return;
    if (isPlaying) playerRef.current.pauseVideo();
    else playerRef.current.playVideo();
  }

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return songs;
    return songs.filter(
      (s) =>
        s.title.toLowerCase().includes(q) ||
        (s.artist || "").toLowerCase().includes(q)
    );
  }, [songs, query]);

  return (
    <div className="app">
      <div className="topbar">
        <h1 className="brand">crates</h1>
        <input
          className="search"
          type="text"
          placeholder="Search your library..."
          value={query}
          onChange={(e) => setQuery(e.target.value)}
        />
        <span className="count">
          {loading ? "loading…" : `${filtered.length} / ${songs.length}`}
        </span>
        <button className="refresh-btn" onClick={refresh} disabled={loading}>
          Refresh
        </button>
      </div>

      <div className="list-wrap">
        {fetchError && <div className="state-msg error">{fetchError}</div>}
        {!fetchError && loading && (
          <div className="state-msg">Loading your library…</div>
        )}
        {!fetchError && !loading && filtered.length === 0 && (
          <div className="state-msg">No tracks match "{query}".</div>
        )}
        {!fetchError &&
          filtered.map((song) => (
            <button
              key={song.videoId}
              className={
                "row" +
                (currentTrack && currentTrack.videoId === song.videoId
                  ? " active"
                  : "")
              }
              onClick={() => playSong(song)}
            >
              {song.thumbnail ? (
                <img className="thumb" src={song.thumbnail} alt="" />
              ) : (
                <div className="thumb placeholder">♪</div>
              )}
              <div className="row-text">
                <div className="row-title">{song.title}</div>
                <div className="row-artist">{song.artist}</div>
              </div>
            </button>
          ))}
      </div>

      <div className="dock">
        <div className="yt-mount" ref={playerDivRef}></div>
        {currentTrack ? (
          <div className="dock-info">
            <div className="dock-title">{currentTrack.title}</div>
            <div className="dock-artist">{currentTrack.artist}</div>
            {playError && <div className="dock-error">{playError}</div>}
          </div>
        ) : (
          <div className="dock-info">
            <div className="dock-empty">Pick a track to start playing</div>
          </div>
        )}
        <button
          className="play-btn"
          onClick={togglePlayPause}
          disabled={!currentTrack || !playerReady}
        >
          {isPlaying ? "❚❚" : "▶"}
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
